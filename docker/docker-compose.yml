services:
  mongodb:
    image: mongo:7.0
    container_name: vxn-mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: vexenhanh
    networks:
      - vxn-network

  redis:
    image: redis:7-alpine
    container_name: vxn-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - vxn-network

  mongo-express:
    image: mongo-express
    container_name: vxn-mongo-express
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password123
      ME_CONFIG_MONGODB_URL: mongodb://admin:password123@mongodb:27017/
    depends_on:
      - mongodb
    networks:
      - vxn-network

volumes:
  mongodb_data:
  redis_data:

networks:
  vxn-network:
    driver: bridge
