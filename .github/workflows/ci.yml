name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ========== JOB 1: Backend ==========
  backend:
    name: Backend - Lint & Test & Build
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/backend/package-lock.json

      # Build shared-types truoc (backend depend vao no)
      - name: Install & Build shared-types
        run: npm ci && npm run build
        working-directory: packages/shared-types

      - name: Install backend dependencies
        run: npm ci
        working-directory: apps/backend

      - name: Run ESLint
        run: npm run lint
        working-directory: apps/backend

      - name: Run tests
        run: npm test -- --passWithNoTests
        working-directory: apps/backend
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/vexenhanh_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test-secret-key-minimum-32-characters-long
          JWT_ACCESS_EXPIRES: 15m
          JWT_REFRESH_EXPIRES: 7d

      - name: Build
        run: npm run build
        working-directory: apps/backend

  # ========== JOB 2: Shared Types ==========
  shared-types:
    name: Shared Types - Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build
        run: npm ci && npm run build
        working-directory: packages/shared-types
